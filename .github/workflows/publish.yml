name: Publish to PyPI

# Builds and publishes to PyPI whenever a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored anywhere.
# One-time setup on PyPI (project → Settings → Publishing → add a trusted
# publisher for GitHub Actions):
#   Owner:              mattluttrell
#   Repository:         natural-perspective-spatial-audio
#   Workflow filename:  publish.yml
#   Environment name:   pypi
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # must match the trusted-publisher config on PyPI
    permissions:
      id-token: write          # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
